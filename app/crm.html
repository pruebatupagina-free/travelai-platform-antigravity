<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM — TravelAI Platform</title>
  <link rel="stylesheet" href="../style.css" />
  <script src="../config.js"></script>
  <style>
    .crm-topbar { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px; }
    .crm-stats { display:flex;gap:12px; }
    .cstat { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 16px;text-align:center; }
    .cstat .val { font-size:1.4rem;font-weight:800; }
    .cstat .lbl { font-size:.68rem;color:var(--text-muted); }
    .kanban { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start; }
    @media(max-width:1100px){.kanban{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.kanban{grid-template-columns:1fr}}
    .kcol { background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;min-height:260px;transition:var(--transition); }
    .kcol.drag-over { border-color:var(--cyan);background:var(--cyan-dim); }
    .col-hd { display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; }
    .col-ttl { display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em; }
    .cdot { width:8px;height:8px;border-radius:50%; }
    .ccnt { background:rgba(255,255,255,.08);border-radius:999px;padding:2px 8px;font-size:.7rem;font-weight:700;color:var(--text-muted); }
    .cards { display:flex;flex-direction:column;gap:9px;min-height:50px; }
    .lcard { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;cursor:grab;transition:var(--transition);user-select:none; }
    .lcard:hover { border-color:var(--border-accent);transform:translateY(-2px);box-shadow:var(--shadow-glow-cyan); }
    .lcard.dragging { opacity:.35;cursor:grabbing; }
    .lc-top { display:flex;align-items:center;gap:9px;margin-bottom:8px; }
    .lav { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0; }
    .lname { font-size:.84rem;font-weight:600; }
    .ldest { font-size:.72rem;color:var(--text-muted); }
    .lc-mid { display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text-secondary);margin-bottom:8px; }
    .lbudget { color:var(--cyan);font-weight:700;font-size:.8rem; }
    .ldays { color:var(--text-muted);font-size:.7rem; }
    .lc-btns { display:flex;gap:6px; }
    .lcbtn { flex:1;padding:5px 0;border-radius:var(--radius-sm);font-size:.7rem;font-weight:600;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:var(--transition); }
    .lcbtn:hover { border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim); }
    .lcbtn.wa:hover { border-color:var(--emerald);color:var(--emerald);background:rgba(16,185,129,.1); }
    .add-btn { width:100%;padding:9px;border-radius:var(--radius-md);background:transparent;border:1px dashed var(--border);color:var(--text-muted);font-size:.78rem;cursor:pointer;transition:var(--transition);margin-top:8px;font-family:'Inter',sans-serif; }
    .add-btn:hover { border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim); }
    /* Modal */
    .modal-ov { position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px; }
    .modal-ov.open { display:flex; }
    .modal-box { background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:26px;width:440px;max-width:100%;animation:fadeInUp .3s ease; }
    .modal-box h3 { margin-bottom:18px; }
    .mfg { margin-bottom:12px; }
    .mfg label { display:block;font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px; }
    .mfc { width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text-primary);font-size:.86rem;font-family:'Inter',sans-serif;transition:var(--transition); }
    .mfc:focus { border-color:var(--cyan); }
    .modal-acts { display:flex;gap:10px;margin-top:18px; }
    .modal-acts button { flex:1;justify-content:center; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✈️</div>
      <div><div class="logo-text">TravelAI</div><div class="logo-sub">PLATFORM</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Principal</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="chatbot.html" class="nav-item"><span class="nav-icon">🤖</span> Chatbot IA</a>
      <a href="itinerario.html" class="nav-item"><span class="nav-icon">🗺️</span> Itinerarios</a>
      <a href="crm.html" class="nav-item active"><span class="nav-icon">👥</span> CRM</a>
      <div class="sidebar-section-label">Sistema</div>
      <a href="#" class="nav-item"><span class="nav-icon">⚙️</span> Configuración</a>
      <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Inicio</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">AG</div>
        <div class="user-info"><div class="user-name">Agencia Demo</div><div class="user-plan">Plan Pro</div></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="app-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <h1>👥 CRM Pipeline</h1><span class="badge badge-cyan">DEMO</span>
      </div>
      <div class="app-header-right">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nuevo lead</button>
      </div>
    </header>

    <div class="app-body">
      <div class="crm-topbar">
        <div class="crm-stats">
          <div class="cstat"><div class="val" id="totalLeads" style="color:var(--cyan)">0</div><div class="lbl">Total leads</div></div>
          <div class="cstat"><div class="val" id="closedLeads" style="color:var(--emerald)">0</div><div class="lbl">Cerrados</div></div>
          <div class="cstat"><div class="val" id="pipelineVal" style="color:var(--blue)">$0</div><div class="lbl">Pipeline</div></div>
        </div>
      </div>

      <div class="kanban" id="kanban">
        <div class="kcol" data-col="nuevo" ondragover="onOver(event)" ondrop="onDrop(event)" ondragleave="onLeave(event)">
          <div class="col-hd"><div class="col-ttl"><div class="cdot" style="background:#06b6d4"></div>Nuevo Lead</div><span class="ccnt" id="cnt-nuevo">0</span></div>
          <div class="cards" id="cards-nuevo"></div>
          <button class="add-btn" onclick="openModal('nuevo')">+ Agregar lead</button>
        </div>
        <div class="kcol" data-col="cotizando" ondragover="onOver(event)" ondrop="onDrop(event)" ondragleave="onLeave(event)">
          <div class="col-hd"><div class="col-ttl"><div class="cdot" style="background:#f59e0b"></div>Cotizando</div><span class="ccnt" id="cnt-cotizando">0</span></div>
          <div class="cards" id="cards-cotizando"></div>
          <button class="add-btn" onclick="openModal('cotizando')">+ Agregar lead</button>
        </div>
        <div class="kcol" data-col="seguimiento" ondragover="onOver(event)" ondrop="onDrop(event)" ondragleave="onLeave(event)">
          <div class="col-hd"><div class="col-ttl"><div class="cdot" style="background:#8b5cf6"></div>Seguimiento</div><span class="ccnt" id="cnt-seguimiento">0</span></div>
          <div class="cards" id="cards-seguimiento"></div>
          <button class="add-btn" onclick="openModal('seguimiento')">+ Agregar lead</button>
        </div>
        <div class="kcol" data-col="cerrado" ondragover="onOver(event)" ondrop="onDrop(event)" ondragleave="onLeave(event)">
          <div class="col-hd"><div class="col-ttl"><div class="cdot" style="background:#10b981"></div>Cerrado ✓</div><span class="ccnt" id="cnt-cerrado">0</span></div>
          <div class="cards" id="cards-cerrado"></div>
          <button class="add-btn" onclick="openModal('cerrado')">+ Agregar lead</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modalOv">
  <div class="modal-box">
    <h3>➕ Nuevo Lead</h3>
    <div class="mfg"><label>Nombre completo *</label><input id="mNombre" class="mfc" type="text" placeholder="Ej: María González" /></div>
    <div class="mfg"><label>Teléfono / WhatsApp</label><input id="mTel" class="mfc" type="tel" placeholder="52 81 1234 5678" /></div>
    <div class="mfg"><label>Destino de interés</label><input id="mDest" class="mfc" type="text" placeholder="Ej: 🇲🇽 Cancún" /></div>
    <div class="mfg"><label>Presupuesto (USD)</label><input id="mBudget" class="mfc" type="text" placeholder="Ej: $3,500" /></div>
    <div class="mfg"><label>Fecha de consulta</label><input id="mFecha" class="mfc" type="date" /></div>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="addLead()">Agregar lead</button>
    </div>
  </div>
</div>

<script>
  const COLORS=['#06b6d4','#3b82f6','#8b5cf6','#10b981','#f59e0b','#f43f5e','#14b8a6','#ec4899'];
  const KEY=TRAVELAI_CONFIG.leadsStorageKey;
  let leads=[];
  let dragId=null;
  let modalCol='nuevo';

  function loadLeads(){
    const s=localStorage.getItem(KEY);
    if(s){leads=JSON.parse(s);}
    else{
      const now=new Date().toISOString().split('T')[0];
      leads=[
        {id:1,nombre:'María González',tel:'528112345678',dest:'🇲🇽 Cancún',budget:'$4,200',fecha:now,col:'nuevo',color:'#06b6d4'},
        {id:2,nombre:'Carlos Ramos',tel:'528198765432',dest:'🇪🇺 Europa',budget:'$8,500',fecha:now,col:'nuevo',color:'#3b82f6'},
        {id:3,nombre:'Ana Martínez',tel:'528111223344',dest:'🇨🇦 Canadá',budget:'$2,800',fecha:now,col:'cotizando',color:'#8b5cf6'},
        {id:4,nombre:'Luis Pérez',tel:'528155667788',dest:'🇺🇸 Miami',budget:'$1,900',fecha:now,col:'cotizando',color:'#f59e0b'},
        {id:5,nombre:'Sandra López',tel:'528199887766',dest:'🇮🇩 Bali',budget:'$5,200',fecha:now,col:'seguimiento',color:'#10b981'},
        {id:6,nombre:'Roberto Cruz',tel:'528133445566',dest:'🇲🇽 CDMX',budget:'$3,800',fecha:now,col:'cerrado',color:'#f43f5e'},
      ];
      saveLeads();
    }
  }
  function saveLeads(){localStorage.setItem(KEY,JSON.stringify(leads));}

  function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
  function daysSince(d){return Math.floor((Date.now()-new Date(d))/(86400000));}
  function numericBudget(b){return parseInt(b.replace(/[^0-9]/g,''))||0;}

  function render(){
    const cols=['nuevo','cotizando','seguimiento','cerrado'];
    let total=0,closed=0,pipeline=0;
    cols.forEach(col=>{
      const c=leads.filter(l=>l.col===col);
      document.getElementById('cnt-'+col).textContent=c.length;
      total+=c.length;
      if(col==='cerrado')closed=c.length;
      else pipeline+=c.reduce((s,l)=>s+numericBudget(l.budget),0);
      const box=document.getElementById('cards-'+col);
      box.innerHTML='';
      c.forEach(lead=>{
        const d=daysSince(lead.fecha);
        const el=document.createElement('div');
        el.className='lcard';el.draggable=true;el.id='lc-'+lead.id;
        el.innerHTML=`
          <div class="lc-top">
            <div class="lav" style="background:${lead.color}">${initials(lead.nombre)}</div>
            <div><div class="lname">${lead.nombre}</div><div class="ldest">${lead.dest||'Sin destino'}</div></div>
          </div>
          <div class="lc-mid">
            <span class="ldays">📅 Hace ${d} día${d!==1?'s':''}</span>
            <span class="lbudget">${lead.budget||'–'}</span>
          </div>
          <div class="lc-btns">
            ${lead.tel?`<button class="lcbtn wa" onclick="event.stopPropagation();window.open('https://wa.me/${lead.tel.replace(/\D/g,'')}','_blank')">💬 WhatsApp</button>`:''}
            <button class="lcbtn" onclick="event.stopPropagation();deleteLead(${lead.id})">🗑️</button>
          </div>`;
        el.addEventListener('dragstart',e=>{dragId=lead.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
        el.addEventListener('dragend',()=>el.classList.remove('dragging'));
        box.appendChild(el);
      });
    });
    document.getElementById('totalLeads').textContent=total;
    document.getElementById('closedLeads').textContent=closed;
    document.getElementById('pipelineVal').textContent='$'+pipeline.toLocaleString();
  }

  function onOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
  function onLeave(e){e.currentTarget.classList.remove('drag-over');}
  function onDrop(e){
    e.preventDefault();e.currentTarget.classList.remove('drag-over');
    const col=e.currentTarget.dataset.col;
    const l=leads.find(x=>x.id===dragId);
    if(l){l.col=col;saveLeads();render();}
    dragId=null;
  }

  function openModal(col='nuevo'){modalCol=col;document.getElementById('modalOv').classList.add('open');document.getElementById('mNombre').focus();const t=new Date().toISOString().split('T')[0];document.getElementById('mFecha').value=t;}
  function closeModal(){
    document.getElementById('modalOv').classList.remove('open');
    ['mNombre','mTel','mDest','mBudget','mFecha'].forEach(id=>document.getElementById(id).value='');
  }

  function addLead(){
    const nombre=document.getElementById('mNombre').value.trim();
    if(!nombre){alert('El nombre es requerido.');return;}
    leads.push({
      id:Date.now(),nombre,
      tel:document.getElementById('mTel').value.trim().replace(/\D/g,''),
      dest:document.getElementById('mDest').value.trim()||'🌍 Por definir',
      budget:document.getElementById('mBudget').value.trim()||'$0',
      fecha:document.getElementById('mFecha').value||new Date().toISOString().split('T')[0],
      col:modalCol,color:COLORS[Math.floor(Math.random()*COLORS.length)]
    });
    saveLeads();closeModal();render();
  }

  function deleteLead(id){if(confirm('¿Eliminar este lead?')){leads=leads.filter(l=>l.id!==id);saveLeads();render();}}

  function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('open');
  }

  document.getElementById('modalOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.getElementById('mNombre').addEventListener('keydown',e=>{if(e.key==='Enter')addLead();});

  loadLeads();render();
</script>
</body>
</html>
